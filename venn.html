<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>课堂小探究 · Venn图互动</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(145deg, #f0f4ff 0%, #e6ecf7 100%);
  padding: 24px;
}

.card {
  max-width: 780px;
  width: 100%;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(2px);
  border-radius: 32px;
  padding: 36px 40px 40px;
  box-shadow: 0 30px 60px -20px rgba(0,20,60,0.25), 0 8px 24px -6px rgba(0,0,0,0.06);
  border: 1px solid rgba(255,255,255,0.6);
}

.header { text-align:center; margin-bottom:28px; }
.header h2 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg,#1e293b,#334155);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.header .sub {
  font-size: 14px;
  color: #64748b;
  margin-top: 4px;
}

.svg-wrapper {
  display: flex;
  justify-content: center;
  margin-bottom: 24px;
  background: #fafcff;
  border-radius: 20px;
  padding: 12px 0 4px;
  border: 1px solid rgba(203,213,235,0.4);
}

#venn {
  width: 100%;
  max-width: 500px;
  height: auto;
  aspect-ratio: 500 / 300;
}

#venn rect {
  fill: #f8fafc;
  stroke: #94a3b8;
  stroke-width: 1.5;
  rx: 12; ry: 12;
}

#venn .universe-label {
  font-size: 16px;
  font-weight: 600;
  fill: #94a3b8;
}

#setA {
  stroke: #3b82f6;
  fill: rgba(59,130,246,0.06);
  transition: stroke 0.3s ease, fill 0.3s ease;
}

#setB {
  stroke: #ef4444;
  fill: rgba(239,68,68,0.06);
  opacity: 0.5;
}

.set-label, .set-label-b {
  font-size: 18px;
  font-weight: 700;
  fill: #1e293b;
}

#intersectionLabel {
  font-size: 15px;
  font-weight: 600;
  fill: #b91c1c;
  transition: x 0.5s ease;
}

#complementaryLabel {
  font-size: 13px;
  font-weight: 500;
  fill: #2563eb;
  visibility: hidden;
  transition: opacity 0.4s ease;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.controls button {
  min-width: 112px;
  padding: 12px 18px;
  font-size: 14px;
  font-weight: 600;
  border: none;
  border-radius: 14px;
  color: #fff;
  cursor: pointer;
  transition: all 0.25s ease;
}

.controls button:nth-child(1){background:linear-gradient(135deg,#4f46e5,#6366f1);}
.controls button:nth-child(2){background:linear-gradient(135deg,#059669,#10b981);}
.controls button:nth-child(3){background:linear-gradient(135deg,#d97706,#f59e0b);}
.controls button:nth-child(4){background:linear-gradient(135deg,#7c3aed,#8b5cf6);}
.controls button:nth-child(5){background:linear-gradient(135deg,#db2777,#ec4899);}
.controls button:nth-child(6){background:linear-gradient(135deg,#475569,#64748b);}

.controls button:hover {
  transform: translateY(-3px) scale(1.02);
}

#highlightLayer path {
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
</style>
</head>

<body>
<div class="card">
  <div class="header">
    <h2>🧪 课堂小探究</h2>
    <span class="sub">集合运算 · Venn 图互动演示</span>
  </div>

  <div class="svg-wrapper">
    <svg id="venn" viewBox="0 0 500 300">
      <rect x="50" y="50" width="400" height="200"/>
      <text x="64" y="76" class="universe-label">U</text>

      <g id="highlightLayer"></g>
      
      <circle id="setA" cx="180" cy="150" r="80"/>
      <circle id="setB" cx="280" cy="150" r="80"/>

      <text x="130" y="100" class="set-label">A</text>
      <text id="textB" x="310" y="100" class="set-label-b">B</text>
      <text id="intersectionLabel" x="215" y="150">AB</text>
      <text id="complementaryLabel" x="110" y="150">AB 的对立事件</text>
    </svg>
  </div>

  <div class="controls">
    <button onclick="highlightComplementOfB()">表示B的对立事件</button>
    <button onclick="clearOutsideA()">只保留A中的B的对立事件</button>
    <button onclick="highlightIntersection()">表示AB</button>
    <button onclick="fadeOutB()">淡出集合B</button>
    <button onclick="separateIntersection()">分离</button>
    <button onclick="resetDiagram()">重置</button>
  </div>
</div>

<script>
let state = {
  isBSeparated: false,
  currentIntersection: null
};

function getIntersectionPath() {
  const A = { cx: 180, cy: 150, r: 80 };
  const B = { cx: 280, cy: 150, r: 80 };
  const d = Math.hypot(B.cx - A.cx, B.cy - A.cy);
  const a = (A.r ** 2 - B.r ** 2 + d ** 2) / (2 * d);
  const h = Math.sqrt(A.r ** 2 - a ** 2);

  const x2 = A.cx + a * (B.cx - A.cx) / d;
  const y2 = A.cy + a * (B.cy - A.cy) / d;

  const x3 = x2 - h * (B.cy - A.cy) / d;
  const y3 = y2 + h * (B.cx - A.cx) / d;

  const x4 = x2 + h * (B.cy - A.cy) / d;
  const y4 = y2 - h * (B.cx - A.cx) / d;

  return `M ${x3} ${y3} A ${A.r} ${A.r} 0 0 1 ${x4} ${y4} A ${B.r} ${B.r} 0 0 1 ${x3} ${y3} Z`;
}

function highlightComplementOfB() {
  const highlightLayer = document.getElementById('highlightLayer');
  
  const roundedRectPath = `
    M 62,50
    L 438,50
    Q 450,50 450,62
    L 450,238
    Q 450,250 438,250
    L 62,250
    Q 50,250 50,238
    L 50,62
    Q 50,50 62,50
    Z
  `;
  
  const circleBPath = `
    M 280,150
    m -80,0
    a 80,80 0 1,0 160,0
    a 80,80 0 1,0 -160,0
  `;
  
  highlightLayer.innerHTML = `
    <path d="${roundedRectPath} ${circleBPath}" 
          fill="#3b82f6" 
          fill-opacity="0.7" 
          fill-rule="evenodd"/>
  `;
  
  document.getElementById('complementaryLabel').style.visibility = 'visible';
}

function clearOutsideA() {
  const highlightLayer = document.getElementById('highlightLayer');
  
  const circleAPath = `
    M 180,150
    m -80,0
    a 80,80 0 1,0 160,0
    a 80,80 0 1,0 -160,0
  `;
  
  const intersectionPath = getIntersectionPath();
  
  highlightLayer.innerHTML = `
    <path d="${circleAPath} ${intersectionPath}" 
          fill="#3b82f6" 
          fill-opacity="0.7" 
          fill-rule="evenodd"/>
  `;
}

function highlightIntersection() {
  const highlightLayer = document.getElementById('highlightLayer');
  const intersectionPath = getIntersectionPath();
  
  // 检查是否已经有交集高亮，如果没有则添加
  let intersectionElement = document.getElementById('intersectionHighlight');
  if (!intersectionElement) {
    intersectionElement = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    intersectionElement.id = 'intersectionHighlight';
    intersectionElement.setAttribute('fill', 'lightcoral');
    intersectionElement.setAttribute('fill-opacity', '0.8');
    highlightLayer.appendChild(intersectionElement);
  }
  
  // 更新交集路径
  intersectionElement.setAttribute('d', intersectionPath);
  
  // 如果已经分离，则应用变换
  if (state.isBSeparated) {
    intersectionElement.style.transform = 'translateX(150px)';
  }
  
  // ✅ 去除A的边框和底色
  const setA = document.getElementById('setA');
  setA.style.stroke = 'none';
  setA.style.fill = 'transparent';
}

function fadeOutB() {
  document.getElementById("setB").style.opacity = 0;
  document.getElementById("textB").style.opacity = 0;
}

function separateIntersection() {
  const intersectionElement = document.getElementById('intersectionHighlight');
  if (intersectionElement) {
    intersectionElement.style.transform = 'translateX(150px)';
    document.getElementById('intersectionLabel').setAttribute('x', '370');
    state.isBSeparated = true;
  }
}

function resetDiagram() {
  document.getElementById('highlightLayer').innerHTML = '';
  document.getElementById('setB').style.opacity = 0.5;
  document.getElementById('textB').style.opacity = 1;
  document.getElementById('intersectionLabel').setAttribute('x', '215');
  document.getElementById('complementaryLabel').style.visibility = 'hidden';
  
  // ✅ 恢复A的边框和底色
  const setA = document.getElementById('setA');
  setA.style.stroke = '#3b82f6';
  setA.style.fill = 'rgba(59,130,246,0.06)';
  
  state.isBSeparated = false;
  state.currentIntersection = null;
}
</script>
</body>
</html>
